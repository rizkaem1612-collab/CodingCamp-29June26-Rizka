<!DOCTYPE html>
<html lang="id" data-theme="dark" data-lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="desain.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       SETTINGS PANEL — fixed top-right
  ════════════════════════════════════════ -->
  <div class="settings-panel">
    <div class="setting-row">
      <span class="setting-label" data-i18n="theme_label">🌙 Dark</span>
      <label class="toggle-switch" aria-label="Toggle theme">
        <input type="checkbox" id="theme-toggle" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>
    <div class="setting-row">
      <span class="setting-label" data-i18n="lang_label">🇮🇩 ID</span>
      <label class="toggle-switch" aria-label="Toggle language">
        <input type="checkbox" id="lang-toggle" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       MAIN WRAPPER — centres everything
  ════════════════════════════════════════ -->
  <div class="dashboard-wrapper">

    <!-- ── ROW 1: HEADER CARD (full width) ── -->
    <div class="card header-card">
      <h1 id="current-time"  class="current-time">00:00:00</h1>
      <p  id="current-date"  class="current-date">Senin, 1 Januari 2025</p>
      <p  id="greeting-msg"  class="greeting-msg">Selamat Pagi! 👋</p>
    </div>

    <!-- ── ROW 2: CONTENT GRID ── -->
    <div class="content-grid">

      <!-- ┌─ KOLOM KIRI ─────────────────┐ -->
      <div class="left-col">

        <!-- A) Focus Timer -->
        <div class="card timer-card">
          <h2 class="card-title" data-i18n="timer_title">⏱ Focus Timer</h2>

          <div class="timer-duration-row">
            <label class="dur-label" data-i18n="timer_duration">Durasi:</label>
            <select id="timer-select" class="select-field dur-select">
              <option value="10">10 min</option>
              <option value="15">15 min</option>
              <option value="20">20 min</option>
              <option value="25" selected>25 min</option>
              <option value="30">30 min</option>
              <option value="35">35 min</option>
              <option value="40">40 min</option>
              <option value="45">45 min</option>
              <option value="50">50 min</option>
              <option value="55">55 min</option>
              <option value="60">60 min</option>
            </select>
          </div>

          <div class="timer-display" id="timer-display">25:00</div>

          <div class="timer-controls">
            <button class="btn btn-primary"   id="btn-start" data-i18n="timer_start">▶ Start</button>
            <button class="btn btn-secondary" id="btn-stop"  data-i18n="timer_stop">⏸ Stop</button>
            <button class="btn btn-ghost"     id="btn-reset" data-i18n="timer_reset">↺ Reset</button>
          </div>

          <p class="timer-label" id="timer-label" data-i18n="timer_ready">Siap untuk fokus?</p>
        </div>

        <!-- B) Quick Links -->
        <div class="card links-card">
          <h2 class="card-title card-title--left" data-i18n="links_title">🔗 Quick Links</h2>

          <div class="input-row link-input-row">
            <input type="text" id="link-name-input" class="input-field"
              placeholder="Nama link" maxlength="30"
              data-i18n-placeholder="link_name_ph" />
            <input type="url" id="link-url-input" class="input-field"
              placeholder="URL"
              data-i18n-placeholder="link_url_ph" />
            <button class="btn btn-primary" id="btn-add-link" data-i18n="links_add">Add Link</button>
          </div>

          <div id="links-container" class="links-container"></div>
          <p class="empty-hint hidden" id="links-empty" data-i18n="links_empty">Belum ada link. Tambahkan favoritmu! 🌐</p>
        </div>

      </div><!-- /left-col -->

      <!-- ┌─ KOLOM KANAN ────────────────┐ -->
      <div class="card todo-card">
        <h2 class="card-title card-title--left" data-i18n="todo_title">✅ Tasks</h2>

        <!-- Add task row -->
        <div class="input-row">
          <input type="text" id="todo-input" class="input-field"
            placeholder="Tambah tugas baru..." maxlength="120"
            data-i18n-placeholder="todo_placeholder" />
          <button class="btn btn-primary" id="btn-add-todo" data-i18n="todo_add">Tambah</button>
        </div>

        <!-- Baris Kontrol Utama To-Do List -->
<div class="todo-controls-bar">
  
  <!-- 1. Category -->
  <label class="control-label">CATEGORY:</label>
  <select id="todo-difficulty" class="select-field select-sm">
    <option value="easy" data-i18n="diff_easy">Mudah</option>
    <option value="normal" selected data-i18n="diff_normal">Normal</option>
    <option value="hard" data-i18n="diff_hard">Sulit</option>
  </select>

  <!-- Garis Pembatas -->
  <div class="divider"></div>

  <!-- 2. Sort By -->
  <span class="control-label" data-i18n="sort_by">SORT BY:</span>
  <select id="sort-field" class="select-field select-xs">
    <option value="created" data-i18n="sort_created">Dibuat</option>
    <option value="deadline" data-i18n="sort_deadline">Deadline</option>
    <option value="difficulty" data-i18n="sort_diff">Kesulitan</option>
    <option value="done" data-i18n="sort_done">Status</option>
  </select>

  <!-- 3. ASC / DESC -->
  <button class="btn btn-ghost btn-sort" id="btn-sort-dir">↑ ASC</button>

  <!-- Garis Pembatas -->
  <div class="divider"></div>

  <!-- 4. Deadline -->
  <label class="control-label">DEADLINE:</label>
  <input type="datetime-local" id="todo-deadline" class="input-field input-sm" />
  
</div>
        <!-- Task list -->
        <ul id="todo-list" class="todo-list"></ul>
        <p class="empty-hint hidden" id="todo-empty" data-i18n="todo_empty">Catat Tugasmu hari ini!!! 🚀</p>
      </div><!-- /todo-card -->

    </div><!-- /content-grid -->

  </div><!-- /dashboard-wrapper -->

  <!-- ═══════════════════════════════════════
       EDIT MODAL
  ════════════════════════════════════════ -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 class="modal-title" data-i18n="edit_title">✏️ Edit Tugas</h3>
      <input type="text" id="edit-input" class="input-field" maxlength="120" />
      <div class="input-row meta-row" style="margin-top:12px;">
        <select id="edit-difficulty" class="select-field select-sm">
          <option value="easy"   data-i18n="diff_easy">Mudah</option>
          <option value="normal" data-i18n="diff_normal">Normal</option>
          <option value="hard"   data-i18n="diff_hard">Sulit</option>
        </select>
        <input type="datetime-local" id="edit-deadline" class="input-field input-sm" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-save-edit"   data-i18n="edit_save">Simpan</button>
        <button class="btn btn-ghost"   id="btn-cancel-edit" data-i18n="edit_cancel">Batal</button>
      </div>
    </div>
  </div>

  <script src="desain.js"></script>
</body>
</html>
